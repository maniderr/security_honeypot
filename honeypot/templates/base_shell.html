<html>
    <head>
        <title>{{ title }}</title>
        <style>
            body { margin: 0; font-family: Inter, Arial, sans-serif; background: linear-gradient(135deg, #0f172a, #111827 60%, #1e293b); color: #e5e7eb; }
            .nav { padding: 18px 28px; border-bottom: 1px solid rgba(148, 163, 184, 0.18); display: flex; justify-content: space-between; align-items: center; }
            .brand { font-size: 18px; font-weight: 700; letter-spacing: 0.4px; }
            .hero { max-width: 1180px; margin: 0 auto; padding: 36px 28px 60px 28px; }
            .panel { background: rgba(15, 23, 42, 0.78); border: 1px solid rgba(148, 163, 184, 0.18); border-radius: 16px; box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35); }
            .grid { display: grid; grid-template-columns: 1.3fr 0.9fr; gap: 24px; }
            .panel-body { padding: 28px; }
            .subtitle { color: #93c5fd; text-transform: uppercase; font-size: 12px; letter-spacing: 0.16em; margin-bottom: 12px; }
            h1 { margin: 0 0 8px 0; font-size: 34px; }
            p { color: #cbd5e1; line-height: 1.6; }
            .metric-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-top: 22px; }
            .metric { padding: 16px; background: rgba(30, 41, 59, 0.85); border-radius: 12px; border: 1px solid rgba(148, 163, 184, 0.14); }
            .metric strong { display: block; font-size: 22px; margin-bottom: 6px; }
            form { display: grid; gap: 14px; }
            label { display: grid; gap: 8px; color: #cbd5e1; font-size: 14px; }
            input, select { width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid #334155; background: #020617; color: #e2e8f0; box-sizing: border-box; }
            button { background: linear-gradient(135deg, #2563eb, #0ea5e9); color: white; border: none; border-radius: 10px; padding: 12px 16px; font-weight: 700; cursor: pointer; }
            .muted { font-size: 13px; color: #94a3b8; }
            .badge { display: inline-block; padding: 6px 10px; border-radius: 999px; background: rgba(14, 165, 233, 0.15); color: #7dd3fc; font-size: 12px; margin-right: 8px; }
            .list { margin: 16px 0 0 0; padding-left: 18px; color: #cbd5e1; }
            @media (max-width: 900px) { .grid, .metric-row { grid-template-columns: 1fr; } }
        </style>
    </head>
    <body>
        <div class="nav">
            <div class="brand">PayFlow Enterprise Gateway</div>
            <div>
                <span class="badge">PCI DSS</span>
                <span class="badge">SOC 2</span>
                <span class="badge">24/7 Monitoring</span>
            </div>
        </div>
        <div class="hero">
            <div class="subtitle">{{ subtitle }}</div>
            {% block content %}{% endblock %}
        </div>
    </body>
</html>
